<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rovil Sharma — Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Nunito:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow-x:hidden;}
body{
  font-family:'Nunito',sans-serif;
  color:#f0f7ff;
  min-height:100vh;
  background:linear-gradient(160deg,#020a14 0%,#041526 45%,#020c1e 100%);
}

/* ── SNOW CANVAS ── */
#snow3d{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── TOP BAR ── */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:4;
  padding:13px 28px;
  display:flex;justify-content:center;align-items:center;gap:12px;
  background:rgba(1,6,20,0.5);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(200,225,255,0.07);
  animation:fadeDown .7s .1s both;
}
.top-bar-dot{width:5px;height:5px;border-radius:50%;background:#7ecfff;opacity:0.6;animation:blink 2.5s ease-in-out infinite;}
.top-bar-text{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:4px;text-transform:uppercase;
  color:rgba(180,215,255,0.5);
}

/* ── CONTENT ── */
.container{
  position:relative;z-index:3;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:70px 24px 64px;
}

/* ── PROFILE ── */
.profile-wrap{
  position:relative;
  margin-bottom:22px;
  animation:fadeUp .7s .25s both;
}
.profile-glow-ring{
  position:absolute;inset:-14px;border-radius:50%;
  background:conic-gradient(
    rgba(126,207,255,0.5),rgba(200,235,255,0.7),
    rgba(255,255,255,0.6),rgba(200,235,255,0.7),rgba(126,207,255,0.5)
  );
  filter:blur(9px);
  animation:spinSlow 10s linear infinite;
  z-index:0;
}
@keyframes spinSlow{to{transform:rotate(360deg);}}
.profile-outer{
  position:relative;z-index:1;
  width:112px;height:112px;border-radius:50%;
  background:conic-gradient(#7ecfff,#c5eaff,#ffffff,#b0d8ff,#7ecfff);
  padding:2.5px;
  animation:spinSlow 15s linear infinite;
}
.profile-inner{
  width:100%;height:100%;border-radius:50%;
  background:linear-gradient(145deg,#0a1e3d,#040e22);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;
  font-size:40px;font-weight:300;font-style:italic;
  color:#a8d8ff;
  border:1px solid rgba(255,255,255,0.06);
}

/* ── NAME ── */
.name-block{
  text-align:center;margin-bottom:30px;
  animation:fadeUp .85s .35s both;
}
.name-block h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(42px,8vw,68px);
  font-weight:300;line-height:1.0;
  color:#ffffff;letter-spacing:2px;
  text-shadow:0 0 60px rgba(126,207,255,0.3),0 4px 30px rgba(0,0,0,0.9);
}
.name-block h1 em{
  font-style:italic;color:#7ecfff;
  text-shadow:0 0 40px rgba(126,207,255,0.65),0 4px 30px rgba(0,0,0,0.9);
}
.loc{
  display:inline-flex;align-items:center;gap:7px;
  margin-top:11px;font-size:12px;
  color:rgba(200,228,255,0.5);
  font-family:'DM Mono',monospace;letter-spacing:2.5px;
}

/* ── CARDS ── */
.cards{
  display:flex;flex-direction:column;gap:13px;
  width:100%;max-width:400px;
  animation:fadeUp .85s .5s both;
}
.ccard{
  display:flex;align-items:center;gap:18px;
  padding:19px 22px;border-radius:22px;
  text-decoration:none;color:inherit;
  position:relative;overflow:hidden;
  background:rgba(255,255,255,0.055);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.11);
  box-shadow:0 8px 36px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.1);
  transition:transform .3s cubic-bezier(.4,0,.2,1),border-color .3s,box-shadow .3s;
  -webkit-tap-highlight-color:rgba(126,207,255,0.08);
}
.ccard::before{
  content:'';position:absolute;top:0;left:-110%;
  width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
  transform:skewX(-18deg);transition:left .55s ease;
}
.ccard:hover::before,.ccard:active::before{left:140%;}
.ccard-p::after{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1.5px;
  background:linear-gradient(90deg,transparent,rgba(126,207,255,0.7),transparent);
  border-radius:99px;
}
.ccard-s::after{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1.5px;
  background:linear-gradient(90deg,transparent,rgba(255,210,80,0.7),transparent);
  border-radius:99px;
}
.ccard:hover,.ccard:active{
  transform:translateY(-5px) scale(1.018);
  border-color:rgba(126,207,255,0.35);
  box-shadow:0 22px 55px rgba(0,0,0,0.5),0 0 35px rgba(126,207,255,0.12),inset 0 1px 0 rgba(255,255,255,0.15);
}
.cicon{
  width:52px;height:52px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:21px;
}
.pi{background:rgba(126,207,255,0.13);border:1px solid rgba(126,207,255,0.28);box-shadow:0 0 18px rgba(126,207,255,0.18);}
.si{background:rgba(255,210,80,0.13); border:1px solid rgba(255,210,80,0.26); box-shadow:0 0 18px rgba(255,210,80,0.16);}
.ctext{flex:1;}
.clabel{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:3.5px;text-transform:uppercase;margin-bottom:4px;}
.pl{color:rgba(126,207,255,0.8);}
.sl{color:rgba(255,210,80,0.8);}
.cnum{
  font-family:'Cormorant Garamond',serif;
  font-size:27px;font-weight:400;
  letter-spacing:1.5px;color:#fff;line-height:1;margin-bottom:4px;
}
.chint{font-size:10.5px;color:rgba(190,220,255,0.5);display:flex;align-items:center;gap:5px;}
.dot{width:6px;height:6px;border-radius:50%;animation:blink 2s ease-in-out infinite;flex-shrink:0;}
.db{background:#7ecfff;box-shadow:0 0 7px #7ecfff;}
.dy{background:#ffd050;box-shadow:0 0 7px #ffd050;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.15;}}
.carrow{font-size:20px;color:rgba(180,215,255,0.25);transition:transform .3s,color .3s;}
.ccard:hover .carrow,.ccard:active .carrow{transform:translateX(6px);color:rgba(126,207,255,0.8);}
.or-row{
  display:flex;align-items:center;gap:12px;
  color:rgba(180,210,255,0.25);font-size:10px;
  letter-spacing:2px;text-transform:uppercase;font-family:'DM Mono',monospace;
}
.or-line{flex:1;height:1px;background:rgba(180,210,255,0.09);}
.nfooter{margin-top:34px;text-align:center;animation:fadeUp .7s .65s both;}
.snow-row{font-size:14px;letter-spacing:10px;opacity:0.35;margin-bottom:8px;}
.ftext{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2.5px;color:rgba(180,210,255,0.25);}

@keyframes fadeUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:400px){
  .cnum{font-size:22px;}.ccard{padding:16px 15px;gap:13px;}.cicon{width:44px;height:44px;font-size:18px;}
}
</style>
</head>
<body>

<canvas id="snow3d"></canvas>

<div class="top-bar">
  <div class="top-bar-dot"></div>
  <div class="top-bar-text">❄ Solan · Himachal Pradesh · India ❄</div>
  <div class="top-bar-dot"></div>
</div>

<div class="container">

  <div class="profile-wrap">
    <div class="profile-glow-ring"></div>
    <div class="profile-outer"><div class="profile-inner">RS</div></div>
  </div>

  <div class="name-block">
    <h1>Rovil <em>Sharma</em></h1>
    <div class="loc">❄️ Solan · Himachal Pradesh</div>
  </div>

  <div class="cards">
    <a class="ccard ccard-p" href="tel:+919418028268">
      <div class="cicon pi">📞</div>
      <div class="ctext">
        <div class="clabel pl">Primary Contact</div>
        <div class="cnum">+91 94180 28268</div>
        <div class="chint"><span class="dot db"></span>Tap to Call</div>
      </div>
      <div class="carrow">›</div>
    </a>

    <div class="or-row"><div class="or-line"></div><span>or</span><div class="or-line"></div></div>

    <a class="ccard ccard-s" href="tel:+918448017662">
      <div class="cicon si">📱</div>
      <div class="ctext">
        <div class="clabel sl">Secondary Contact</div>
        <div class="cnum">+91 84480 17662</div>
        <div class="chint"><span class="dot dy"></span>WhatsApp Available</div>
      </div>
      <div class="carrow">›</div>
    </a>
  </div>

  <div class="nfooter">
    <div class="snow-row">❄ ❅ ❆ ❅ ❄</div>
    <div class="ftext">© 2026 · Rovil Sharma · Himachal Pradesh</div>
  </div>

</div>

<script>
(function(){
  const canvas=document.getElementById('snow3d');
  const ctx=canvas.getContext('2d');
  let W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);

  function drawCrystal(x,y,size,rot,alpha,depth){
    ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.globalAlpha=alpha;
    if(depth===2){
      const g=ctx.createRadialGradient(0,0,0,0,0,size*2.8);
      g.addColorStop(0,`rgba(200,232,255,${alpha*0.28})`);
      g.addColorStop(1,'rgba(180,215,255,0)');
      ctx.beginPath();ctx.arc(0,0,size*2.8,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    }
    const branchCount=depth===2?3:depth===1?2:1;
    for(let i=0;i<6;i++){
      ctx.save();ctx.rotate((i*Math.PI*2)/6);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-size);
      ctx.strokeStyle=`rgba(230,245,255,${alpha})`;
      ctx.lineWidth=Math.max(0.6,size*(depth===2?0.11:0.09));
      ctx.lineCap='round';ctx.stroke();
      for(let b=1;b<=branchCount;b++){
        const pos=size*(b/(branchCount+1));
        const len=size*(0.38-b*0.07);
        ctx.beginPath();ctx.moveTo(0,-pos);ctx.lineTo(-len*0.75,-pos-len*0.65);
        ctx.strokeStyle=`rgba(215,238,255,${alpha*0.82})`;
        ctx.lineWidth=Math.max(0.4,size*(depth===2?0.08:0.06));ctx.stroke();
        ctx.beginPath();ctx.moveTo(0,-pos);ctx.lineTo(len*0.75,-pos-len*0.65);ctx.stroke();
        if(depth===2&&b===1){
          ctx.lineWidth=Math.max(0.3,size*0.055);
          ctx.strokeStyle=`rgba(200,230,255,${alpha*0.65})`;
          const bx1=-len*0.75,by1=-pos-len*0.65;
          ctx.beginPath();ctx.moveTo(bx1,by1);ctx.lineTo(bx1-len*0.38,by1-len*0.38);ctx.stroke();
          ctx.beginPath();ctx.moveTo(bx1,by1);ctx.lineTo(bx1+len*0.18,by1-len*0.45);ctx.stroke();
          const bx2=len*0.75;
          ctx.beginPath();ctx.moveTo(bx2,by1);ctx.lineTo(bx2+len*0.38,by1-len*0.38);ctx.stroke();
          ctx.beginPath();ctx.moveTo(bx2,by1);ctx.lineTo(bx2-len*0.18,by1-len*0.45);ctx.stroke();
        }
      }
      ctx.restore();
    }
    ctx.beginPath();
    for(let h=0;h<6;h++){const hx=Math.cos(h*Math.PI/3)*size*0.16,hy=Math.sin(h*Math.PI/3)*size*0.16;h===0?ctx.moveTo(hx,hy):ctx.lineTo(hx,hy);}
    ctx.closePath();ctx.fillStyle=`rgba(245,252,255,${alpha})`;ctx.fill();
    ctx.beginPath();ctx.arc(0,0,size*0.06,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${alpha})`;ctx.fill();
    ctx.restore();
  }

  function drawDot(x,y,r,alpha){
    const g=ctx.createRadialGradient(x,y,0,x,y,r*2);
    g.addColorStop(0,`rgba(240,250,255,${alpha})`);g.addColorStop(1,'rgba(200,230,255,0)');
    ctx.beginPath();ctx.arc(x,y,r*2,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=`rgba(245,252,255,${alpha})`;ctx.fill();
  }

  function mkFlake(minS,maxS,minSp,maxSp,aMin,aMax,depth){
    return{x:Math.random()*1.25-0.12,y:Math.random(),size:minS+Math.random()*(maxS-minS),
      speed:minSp+Math.random()*(maxSp-minSp),drift:(Math.random()-.5)*0.00025,
      rot:Math.random()*Math.PI*2,rotSp:(Math.random()-.5)*(depth===2?0.003:depth===1?0.006:0.01),
      swing:Math.random()*Math.PI*2,swingSp:0.005+Math.random()*0.015,
      alpha:aMin+Math.random()*(aMax-aMin),depth};
  }

  const flakes=[
    ...Array.from({length:110},()=>mkFlake(0.8,2.2,0.00035,0.0009,0.2,0.55,0)),
    ...Array.from({length:65}, ()=>mkFlake(3,  6,  0.00022,0.00055,0.3,0.65,1)),
    ...Array.from({length:26}, ()=>mkFlake(7,  14, 0.00012,0.0003, 0.4,0.8, 2)),
  ];

  let wind=0,windTarget=0;
  function animate(){
    ctx.clearRect(0,0,W,H);
    wind+=(windTarget-wind)*0.001;
    if(Math.random()<0.003)windTarget=(Math.random()-.5)*0.0006;
    flakes.forEach(f=>{
      f.swing+=f.swingSp;f.y+=f.speed;
      f.x+=f.drift+Math.sin(f.swing)*0.00025+wind;f.rot+=f.rotSp;
      if(f.y>1.06){f.y=-0.06;f.x=Math.random()*1.25-0.12;}
      if(f.x>1.18)f.x=-0.18;if(f.x<-0.18)f.x=1.18;
      if(f.depth===0)drawDot(f.x*W,f.y*H,f.size,f.alpha);
      else drawCrystal(f.x*W,f.y*H,f.size,f.rot,f.alpha,f.depth);
    });
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
</body>
</html>
